<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مدير الحجوزات</title>
  <style>
    :root {
      --bg-top: #eef5ff;
      --bg-mid: #f5f7fb;
      --bg-btm: #eef2f8;
      --line: rgba(255, 255, 255, 0.36);
      --line-strong: rgba(255, 255, 255, 0.54);
      --text: #152033;
      --muted: #5e6b82;
      --success: #19a765;
      --danger: #f05d5e;
      --warning: #f59e0b;
      --shadow-xl: 0 30px 80px rgba(25, 43, 77, 0.14);
      --shadow-md: 0 10px 24px rgba(25, 43, 77, 0.08);
      --radius-2xl: 34px;
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }

    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 10%, rgba(110,168,255,0.24), transparent 22%),
        radial-gradient(circle at 88% 14%, rgba(139,125,255,0.14), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(184,211,255,0.26), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 44%, var(--bg-btm) 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.28), transparent 24%),
        radial-gradient(circle at 80% 22%, rgba(255,255,255,0.18), transparent 18%);
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 20px 14px 34px;
    }

    .brand-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 2px 20px;
    }

    .logo-box {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.54));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), var(--shadow-md);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-copy h1 {
      margin: 0 0 4px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .brand-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .action-button {
      width: 100%;
      min-height: 118px;
      padding: 22px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-2xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.42));
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      text-align: right;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 42px rgba(25, 43, 77, 0.12);
    }

    .action-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .action-subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.58));
      border: 1px solid var(--line-strong);
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 16px rgba(25,43,77,0.05);
    }

    .status-strip {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.4);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(18, 28, 46, 0.24);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modal.active { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      overflow: auto;
      padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
      border-radius: 28px 28px 0 0;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.68));
      box-shadow: 0 -20px 42px rgba(25,43,77,0.16);
      backdrop-filter: blur(26px) saturate(1.2);
      -webkit-backdrop-filter: blur(26px) saturate(1.2);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .modal-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.58));
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(25,43,77,0.05);
    }

    .list-wrap {
      display: grid;
      gap: 12px;
    }

    .booking-card {
      padding: 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.58));
      border: 1px solid var(--line-strong);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(25,43,77,0.05);
    }

    .booking-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .booking-head h3 {
      margin: 0 0 4px;
      font-size: 18px;
      color: var(--text);
    }

    .booking-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.pending {
      background: rgba(245,158,11,0.14);
      color: #9a6700;
      border: 1px solid rgba(245,158,11,0.18);
    }

    .badge.booked {
      background: rgba(240,93,94,0.14);
      color: #991b1b;
      border: 1px solid rgba(240,93,94,0.18);
    }

    .booking-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-box {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(255,255,255,0.34);
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .meta-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .booking-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .booking-actions button,
    .booking-actions a,
    .booking-actions div {
      min-height: 46px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .btn-confirm {
      color: #fff;
      background: linear-gradient(135deg, #19a765, #1f9d63);
      box-shadow: 0 14px 26px rgba(25, 167, 101, 0.22);
    }

    .wa-link {
      color: #fff;
      background: linear-gradient(135deg, #25d366, #1ebe5d);
      box-shadow: 0 14px 26px rgba(37, 211, 102, 0.22);
    }

    .status-message {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 13px;
      line-height: 1.7;
    }

    .status-message.success {
      display: block;
      background: rgba(25,167,101,0.12);
      border-color: rgba(25,167,101,0.18);
      color: #166534;
    }

    .status-message.error {
      display: block;
      background: rgba(240,93,94,0.12);
      border-color: rgba(240,93,94,0.18);
      color: #991b1b;
    }

    .empty-state {
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.46);
      border: 1px dashed rgba(255,255,255,0.54);
    }

    @media (min-width: 760px) {
      .action-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell { padding: 16px 10px 24px; }
      .logo-box { width: 58px; height: 58px; border-radius: 18px; }
      .brand-copy h1 { font-size: 24px; }
      .brand-copy p { font-size: 12px; }
      .action-title { font-size: 21px; }
      .modal-card {
        max-height: 88vh;
        padding: 14px 12px calc(16px + env(safe-area-inset-bottom));
      }
      .booking-grid,
      .booking-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="brand-header">
      <div class="logo-box">
        <img src="logo.png" alt="شعار استراحاتنا الثلاث" onerror="this.style.display='none'; this.parentNode.innerHTML='🏡'">
      </div>
      <div class="brand-copy">
        <h1>لوحة مدير الحجوزات</h1>
        <p>إدارة الطلبات الجديدة والمؤكدة فقط.</p>
      </div>
    </section>

    <section class="action-grid">
      <button class="action-button" id="pendingBtn" type="button">
        <div class="action-title">طلبات حجز جديدة</div>
        <div class="action-subtitle">طلبات بحالة بانتظار التأكيد.</div>
        <div class="count-badge" id="pendingCount">0</div>
      </button>

      <button class="action-button" id="bookedBtn" type="button">
        <div class="action-title">الحجوزات المؤكدة</div>
        <div class="action-subtitle">الحجوزات التي حالتها محجوز.</div>
        <div class="count-badge" id="bookedCount">0</div>
      </button>
    </section>

    <div class="status-strip" id="statusStrip">جاري تحميل البيانات...</div>
  </div>

  <div class="modal" id="listModal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">القائمة</h2>
          <p id="modalSubtitle">تفاصيل السجلات</p>
        </div>
        <button class="close-btn" id="closeModal" type="button">×</button>
      </div>

      <div class="status-message" id="statusMessage"></div>
      <div class="list-wrap" id="listWrap"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyHpPNiodZ08gv0DHHKeIzCVABAmC0tMb3Otxds4jBn09D3Vdb5ssBcfIyUDQ7G-iVARA/exec';

    const statusStrip = document.getElementById('statusStrip');
    const pendingBtn = document.getElementById('pendingBtn');
    const bookedBtn = document.getElementById('bookedBtn');
    const pendingCount = document.getElementById('pendingCount');
    const bookedCount = document.getElementById('bookedCount');
    const listModal = document.getElementById('listModal');
    const closeModal = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const listWrap = document.getElementById('listWrap');
    const statusMessage = document.getElementById('statusMessage');

    let bookingData = [];
    let currentView = 'pending';

    function normalizeDate(value) {
      if (!value) return '';
      if (typeof value === 'string') return value.trim().slice(0, 10);
      const date = new Date(value);
      if (isNaN(date.getTime())) return '';
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function normalizePhoneForWhatsApp(phone) {
      let digits = String(phone || '').replace(/[^0-9]/g, '');
      if (digits.indexOf('00') === 0) digits = digits.slice(2);
      return digits;
    }

    function getWhatsAppLink(item) {
      const phone = normalizePhoneForWhatsApp(item['الجوال']);
      if (!phone) return '';
      const name = String(item['الاسم'] || '').trim();
      const resort = String(item['الاستراحة'] || '').trim();
      const date = normalizeDate(item['التاريخ']);
      const text = encodeURIComponent('السلام عليكم ' + (name || '') + '، بخصوص طلب الحجز في ' + resort + ' بتاريخ ' + date + '.');
      return 'https://wa.me/' + phone + '?text=' + text;
    }

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = 'status-message ' + type;
    }

    function clearStatus() {
      statusMessage.textContent = '';
      statusMessage.className = 'status-message';
    }

    async function loadBookings() {
      try {
        statusStrip.textContent = 'جاري تحميل البيانات...';

        const res = await fetch(API_URL, {
          method: 'GET',
          cache: 'no-store'
        });

        const rawText = await res.text();
        let json;

        try {
          json = JSON.parse(rawText);
        } catch (e) {
          throw new Error('الرد من Apps Script ليس JSON صالحًا');
        }

        if (!json.success) {
          throw new Error(json.message || 'تعذر تحميل البيانات');
        }

        bookingData = Array.isArray(json.data) ? json.data : [];

        const pending = bookingData.filter(function(item) {
          return String(item['الحالة'] || '').trim() === 'بانتظار التأكيد';
        });

        const booked = bookingData.filter(function(item) {
          return String(item['الحالة'] || '').trim() === 'محجوز';
        });

        pendingCount.textContent = String(pending.length);
        bookedCount.textContent = String(booked.length);
        statusStrip.textContent = 'تم تحديث البيانات بنجاح';

        if (listModal.classList.contains('active')) {
          renderCurrentView();
        }
      } catch (error) {
        console.error(error);
        statusStrip.textContent = 'تعذر تحميل البيانات';
        if (listModal.classList.contains('active')) {
          listWrap.innerHTML = '<div class="empty-state">تعذر تحميل البيانات.</div>';
        }
      }
    }

    function getItemsByView(view) {
      const filtered = bookingData.filter(function(item) {
        const status = String(item['الحالة'] || '').trim();
        return view === 'pending' ? status === 'بانتظار التأكيد' : status === 'محجوز';
      });

      return filtered.sort(function(a, b) {
        return normalizeDate(a['التاريخ']).localeCompare(normalizeDate(b['التاريخ']));
      });
    }

    function renderCurrentView() {
      clearStatus();
      const items = getItemsByView(currentView);

      if (currentView === 'pending') {
        modalTitle.textContent = 'طلبات حجز جديدة';
        modalSubtitle.textContent = 'قائمة الطلبات بحالة بانتظار التأكيد.';
      } else {
        modalTitle.textContent = 'الحجوزات المؤكدة';
        modalSubtitle.textContent = 'قائمة الحجوزات بحالة محجوز.';
      }

      if (!items.length) {
        listWrap.innerHTML = '<div class="empty-state">لا توجد سجلات في هذه القائمة حاليًا.</div>';
        return;
      }

      listWrap.innerHTML = items.map(function(item) {
        const date = normalizeDate(item['التاريخ']);
        const resort = String(item['الاستراحة'] || '').trim();
        const status = String(item['الحالة'] || '').trim();
        const bookingType = String(item['نوع الحجز'] || '').trim() || '-';
        const name = String(item['الاسم'] || '').trim() || '-';
        const phone = String(item['الجوال'] || '').trim() || '-';
        const notes = String(item['ملاحظات'] || '').trim() || '-';
        const waLink = getWhatsAppLink(item);
        const badgeClass = currentView === 'pending' ? 'pending' : 'booked';

        let actionsHtml = '';
        if (currentView === 'pending') {
          actionsHtml += '<button class="btn-confirm" type="button" data-date="' + date + '" data-resort="' + resort + '">تأكيد الحجز</button>';
        } else {
          actionsHtml += '<div class="btn-confirm" style="opacity:.75;pointer-events:none;">تم التأكيد</div>';
        }

        if (waLink) {
          actionsHtml += '<a class="wa-link" href="' + waLink + '" target="_blank" rel="noopener noreferrer">واتساب العميل</a>';
        } else {
          actionsHtml += '<div class="wa-link" style="opacity:.75;pointer-events:none;">لا يوجد واتساب</div>';
        }

        return '' +
          '<article class="booking-card">' +
            '<div class="booking-head">' +
              '<div>' +
                '<h3>' + resort + '</h3>' +
                '<div class="booking-sub">التاريخ: ' + date + '</div>' +
              '</div>' +
              '<span class="badge ' + badgeClass + '">' + status + '</span>' +
            '</div>' +
            '<div class="booking-grid">' +
              '<div class="meta-box"><div class="meta-label">نوع الحجز</div><div class="meta-value">' + bookingType + '</div></div>' +
              '<div class="meta-box"><div class="meta-label">الاسم</div><div class="meta-value">' + name + '</div></div>' +
              '<div class="meta-box"><div class="meta-label">الجوال</div><div class="meta-value">' + phone + '</div></div>' +
              '<div class="meta-box"><div class="meta-label">الملاحظات</div><div class="meta-value">' + notes + '</div></div>' +
            '</div>' +
            '<div class="booking-actions">' + actionsHtml + '</div>' +
          '</article>';
      }).join('');
    }

    function openList(view) {
      currentView = view;
      renderCurrentView();
      listModal.classList.add('active');
    }

    function closeList() {
      listModal.classList.remove('active');
      clearStatus();
    }

    async function confirmBooking(date, resort) {
      try {
        showStatus('جاري تأكيد الحجز...', 'success');

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({
            action: 'updateStatus',
            date: date,
            resort: resort,
            status: 'محجوز'
          })
        });

        const rawText = await res.text();
        let json;

        try {
          json = JSON.parse(rawText);
        } catch (e) {
          throw new Error('تعذر قراءة رد تحديث الحالة');
        }

        if (!json.success) {
          throw new Error(json.message || 'تعذر تحديث الحالة');
        }

        showStatus('تم تأكيد الحجز بنجاح.', 'success');
        await loadBookings();
        renderCurrentView();
      } catch (error) {
        console.error(error);
        showStatus(error.message || 'حدث خطأ أثناء تأكيد الحجز', 'error');
      }
    }

    pendingBtn.addEventListener('click', function() { openList('pending'); });
    bookedBtn.addEventListener('click', function() { openList('booked'); });
    closeModal.addEventListener('click', closeList);
    listModal.addEventListener('click', function(e) {
      if (e.target === listModal) closeList();
      if (e.target.matches('.btn-confirm[data-date][data-resort]')) {
        confirmBooking(e.target.getAttribute('data-date'), e.target.getAttribute('data-resort'));
      }
    });

    loadBookings();
  </script>
</body>
</html>
